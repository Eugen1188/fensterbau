name: Deploy fensterbau to server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Angular Build erstellen
        run: npm run build

      - name: SSH einrichten
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 22 -H 178.104.47.231 >> ~/.ssh/known_hosts

      - name: Build auf Server hochladen
        run: |
          rsync -az --delete \
            -e "ssh -p 22 -i ~/.ssh/id_ed25519" \
            ./dist/fensterbau/browser/ root@178.104.47.231:/var/www/sites/info-jh/

      - name: PHP-Datei hochladen
        run: |
          rsync -az \
            -e "ssh -p 22 -i ~/.ssh/id_ed25519" \
            ./sendmail.php root@178.104.47.231:/var/www/sites/info-jh/