<header>
  <div class="tel-choice-cont" *ngIf="contactChoice">
    <a href="tel:+491637657673" class="contact-choice">Anrufen</a>
    <a href="https://wa.me/491637657673" class="contact-choice">Whatsapp</a>
  </div>
  <div
    class="mobile-overlay"
    [ngClass]="{ active: showMenu || contactChoice }"
    (click)="closeAll()">
  </div>
  <div class="mobile-nav-cont" [ngClass]="{ open: showMenu }">

    <svg
      class="close-btn"
      (click)="showMenuToggle()"
      xmlns="http://www.w3.org/2000/svg"
      width="16"
      height="16"
      viewBox="0 0 16 16">

      <path
        fill="none"
        stroke="#6697d7"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="1.5"
        d="m11.25 4.75-6.5 6.5m0-6.5 6.5 6.5"/>
    </svg>

    <div class="nav-headline">Navigation</div>

    <div class="nav-buttons-cont">
      <a href="#about" (click)="closeAll()">
        <div class="nav-sections-cont">

          <div class="nav-section">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="20" fill="#a0baeb"/>
              <circle cx="20" cy="16" r="4" fill="white"/>
              <path d="M12 28c0-4 3.5-6 8-6s8 2 8 6" fill="white"/>
            </svg>

            <span>Über Uns</span>
          </div>

          <svg class="arrow" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="#9fb2dc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 6l6 6-6 6"/>
          </svg>

        </div>
      </a>
      <a href="#references" (click)="closeAll()">
        <div class="nav-sections-cont">

          <div class="nav-section">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="20" fill="#a0baeb"/>
              <rect x="11" y="13" width="18" height="14" rx="2" fill="white"/>
              <circle cx="17" cy="17" r="1.5" fill="#a0baeb"/>
            </svg>

            <span>Referenzen</span>
          </div>

          <svg class="arrow" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="#9fb2dc" stroke-width="2">
            <path d="M9 6l6 6-6 6"/>
          </svg>

        </div>
      </a>
      <a href="#contact" (click)="closeAll()">
        <div class="nav-sections-cont">

          <div class="nav-section">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="20" fill="#a0baeb"/>
              <rect x="11" y="14" width="18" height="12" rx="2" fill="white"/>
              <path d="M11 16l9 6 9-6"
                stroke="#a0baeb"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"/>
            </svg>

            <span>Kontakt</span>
          </div>

          <svg class="arrow" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="#9fb2dc" stroke-width="2">
            <path d="M9 6l6 6-6 6"/>
          </svg>

        </div>
      </a>

    </div>
  </div>
  <nav>

    <img class="logo" src="img/logo_without_background.png" alt="Logo"/>

    <div class="links">

      <div class="link-cont">
        <a href="#about">Über uns</a>
        <div class="line"></div>
      </div>

      <div class="link-cont">
        <a href="#references">Referenzen</a>
        <div class="line"></div>
      </div>

      <div class="link-cont">
        <a href="#contact">Kontakt</a>
        <div class="line"></div>
      </div>

      <div class="tel-cont" (click)="showContactChoiceToggle()">
        <div class="btn-call">

          <svg width="21" height="21" viewBox="0 0 24 24">
            <path fill="white"
              d="M16.552 22.133c-1.44-.053-5.521-.617-9.795-4.89
              c-4.273-4.274-4.836-8.354-4.89-9.795
              c-.08-2.196 1.602-4.329 3.545-5.162
              a1.47 1.47 0 0 1 1.445.159
              c1.6 1.166 2.704 2.93 3.652 4.317
              a1.504 1.504 0 0 1-.256 1.986
              l-1.951 1.449
              a.48.48 0 0 0-.142.616
              c.442.803 1.228 1.999 2.128 2.899
              s2.153 1.738 3.012 2.23
              a.483.483 0 0 0 .644-.162
              l1.27-1.933
              a1.503 1.503 0 0 1 2.056-.332
              c1.407.974 3.049 2.059 4.251 3.598
              a1.47 1.47 0 0 1 .189 1.485
              c-.837 1.953-2.955 3.616-5.158 3.535"/>
          </svg>

          0163 7657673

        </div>
      </div>

    </div>
    <svg
      class="mobile-nav-btn"
      (click)="showMenuToggle()"
      xmlns="http://www.w3.org/2000/svg"
      width="24"
      height="24"
      viewBox="0 0 24 24">

      <path fill="white"
        d="M20 17.5H4a1.5 1.5 0 1 1 0-3h16a1.5 1.5 0 0 1 0 3zm0-7H4a1.5 1.5 0 1 1 0-3h16a1.5 1.5 0 0 1 0 3zM20 3.5H4a1.5 1.5 0 1 1 0-3h16a1.5 1.5 0 0 1 0 3z"/>
    </svg>

  </nav>
  <div class="headline-cont">

    <img class="logo2" src="img/logo2.png" alt="Logo"/>

    <h1>
      Ihr Partner für<br>
      Fenster & Türen
    </h1>

    <h2>Alles aus einer Hand</h2>

    <div class="btn-cont">
      <button onclick="location.href='#references'">Referenzen</button>
      <button onclick="location.href='#contact'">Kontakt</button>
    </div>

  </div>

</header>
